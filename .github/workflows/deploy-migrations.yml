name: Deploy Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

  workflow_dispatch:

concurrency:
  group: migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing required secret: SUPABASE_DB_URL"
            echo "Set it to the direct Postgres connection string from Supabase Dashboard → Settings → Database"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run pending migrations
        run: ./scripts/run-migrations.sh
