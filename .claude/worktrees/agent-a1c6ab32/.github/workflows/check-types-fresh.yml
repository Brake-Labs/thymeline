name: Check Supabase Types

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

jobs:
  check-types:
    name: Verify generated types are fresh
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing required secrets: SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run update-types
      - name: Check for type drift
        run: |
          if git diff --exit-code types/database.ts; then
            echo "✅ Generated types are up to date"
          else
            echo "⚠️ Generated types are stale — database schema has changed"
            echo "Run: npm run update-types (with SUPABASE_PROJECT_REF set)"
            git diff types/database.ts
            exit 1
          fi
