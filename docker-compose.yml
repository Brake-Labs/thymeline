services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thymeline
      POSTGRES_USER: thymeline
      POSTGRES_PASSWORD: thymeline
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thymeline -d thymeline']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
